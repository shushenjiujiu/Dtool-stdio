# ============================================================
# dtool Studio — Docker Compose
# 版本: v0.1
# 维护: Manager (系统运维与安全审计官)
#
# 用法:
#   全部启动:        docker compose up -d
#   构建+启动:      docker compose up -d --build
#   查看日志:       docker compose logs -f
#   停止全部:       docker compose down
# ============================================================

services:
  # ========================================
  # dtool Studio 后端 — 执行引擎 + WebSocket API
  # ========================================
  studio-backend:
    build:
      context: ..
      dockerfile: packages/server/Dockerfile
    container_name: dtool-studio-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_LOOP_ITERATIONS=${MAX_LOOP_ITERATIONS:-10000}
    volumes:
      - studio-data:/app/data
    restart: unless-stopped
    networks:
      - studio-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ========================================
  # dtool Studio 前端 — Nginx + React SPA
  # ========================================
  studio-frontend:
    build:
      context: ..
      dockerfile: packages/studio/Dockerfile
    container_name: dtool-studio-frontend
    ports:
      - "3000:80"
    depends_on:
      studio-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - studio-net

# ========================================
# 网络 & 存储
# ========================================
networks:
  studio-net:
    name: dtool-studio-net
    driver: bridge

volumes:
  studio-data:
    name: dtool-studio-data
